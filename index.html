    text-align: left;
    font-family: inherit;
    color: #3d2817;

  .option:hover {

    border-color: #c9a57b;

  .result {

  .bread-emoji {

  }
  .bread-description {

    line-height: 1.7;
    text-align: left;
    margin-bottom: 20px;
    color: #3d2817;
  }
  .bread-description p {
    margin-bottom: 15px;
  }
  .restart-btn {
    background: #6b3410;
    color: #fffaf0;
    border: none;
    padding: 14px 32px;
    font-size: 1em;
    border-radius: 30px;
    cursor: pointer;
    font-family: inherit;
    margin-top: 15px;
    transition: all 0.2s ease;
  }
  .restart-btn:hover {
    background: #8b6542;

  }
  .intro {
    text-align: center;
  }
  .intro p {
    margin-bottom: 20px;
    font-size: 1.1em;
    line-height: 1.6;
  }
  .start-btn {
    background: #6b3410;
    color: #fffaf0;
    border: none;
    padding: 16px 40px;
    font-size: 1.1em;
    border-radius: 30px;
    cursor: pointer;
    font-family: inherit;
    margin-top: 10px;
    transition: all 0.2s ease;
  }
  .start-btn:hover {
    background: #8b6542;
    transform: scale(1.05);
  }
</style>
</head>

  <div class="container" id="app"></div>

let currentQuestion = 0;
let scores = { bagget: 0, chiabata: 0, borodynsky: 0, toast: 0, pampushka: 0, focaccia: 0 };

const app = document.getElementById('app');

function renderIntro() {
  app.innerHTML = `
    <h1>Який ти хліб?</h1>
    <div class="subtitle">Серйозний тест. Несерйозні питання.</div>
    <div class="intro">
      <p>10 неочікуваних питань. Один чесний результат. Ніякого осуду — тільки борошно, вода і правда про тебе.</p>
      <p>Відповідай першим інстинктом. Хліб не любить, коли думають занадто довго.</p>
      <button class="start-btn" onclick="startQuiz()">Почати</button>
    </div>
  `;
}

function startQuiz() {
  currentQuestion = 0;
  scores = { bagget: 0, chiabata: 0, borodynsky: 0, toast: 0, pampushka: 0, focaccia: 0 };
  renderQuestion();
}

function renderQuestion() {
  const q = questions[currentQuestion];
  const progress = (currentQuestion / questions.length) * 100;
  app.innerHTML = `
    <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
    <div class="question-number">Питання ${currentQuestion + 1} з ${questions.length}</div>
    <div class="question">${q.q}</div>
    <div class="options">
      ${q.options.map((opt, i) => `<button class="option" onclick="answer('${opt.type}')">${opt.text}</button>`).join('')}
    </div>
  `;
}

function answer(type) {
  scores[type]++;
  currentQuestion++;
  if (currentQuestion < questions.length) {
    renderQuestion();
  } else {
    showResult();
  }
}

function showResult() {
  let winner = Object.keys(scores).reduce((a, b) => scores[a] >= scores[b] ? a : b);
  const bread = breads[winner];
  app.innerHTML = `
    <div class="progress-bar"><div class="progress-fill" style="width:100%"></div></div>
    <div class="result">
      <div class="bread-emoji">${bread.emoji}</div>
      <div class="bread-name">Ти — ${bread.name}</div>
      <div class="bread-description">
        ${bread.description.map(p => `<p>${p}</p>`).join('')}
      </div>
      <button class="restart-btn" onclick="renderIntro()">Пройти ще раз</button>
    </div>
  `;
}

renderIntro();
</script>
